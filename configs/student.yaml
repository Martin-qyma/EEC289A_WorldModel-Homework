seed: 289
device: auto
torch_num_threads: 1

model:
  hidden_dim: 256
  num_layers: 4
  use_gru: false

training:
  batch_size: 256
  updates: 18000
  smoke_updates: 120
  train_sequence_length: 128
  learning_rate: 5.0e-4
  grad_clip_norm: 2.0
  eval_every: 500
  smoke_eval_every: 20
  val_horizon: 300
  max_val_windows: 128
  checkpoint_metric: val/VPT80@0.25
  checkpoint_mode: max

loss:
  one_step_weight: 3.0
  rollout_weight: 1.0
  rollout_train_horizon: 60
  rollout_min_horizon: 5
  delta_reg_weight: 1.0e-4
  delta_reg_slack: 5.0
  obs_noise_std: 0.02

eval:
  warmup_steps: 10
  horizon: auto
  max_horizon: 1000
  report_horizons: [1, 5, 10, 90, 100, 200, 500, 1000]
  vpt_thresholds: [0.10, 0.25, 0.50]
